name: CI

on:
  push:
    branches: [main]
  pull_request:

# Supersede in-flight runs on the same ref (the macOS + MLX build is expensive).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: fmt + clippy + test (macOS / Metal GPU)
    # Apple-Silicon runner: MLX is Apple-Silicon-only and the tests eval on the
    # Metal GPU (the crate forces RUST_TEST_THREADS=1 via .cargo/config.toml,
    # since MLX's default Metal device is not thread-safe).
    #
    # macos-15 is the newest hosted Apple-Silicon image (no hosted macos-26 exists).
    # MLX 0.30.6's CPU SIMD does not compile against the SDK-14 headers on macos-14,
    # so we build here against SDK 15. The shipping config (.cargo/config.toml) targets
    # macOS 26 / Metal 400 for the NAX fast kernels; that needs SDK >= 26.2, which no
    # hosted runner provides, so CI lowers the deployment target to 15.0 (Metal 320) to
    # verify correctness. CI therefore does NOT exercise the NAX fast path — that
    # requires a macOS-26 self-hosted runner. See sc-2352.
    runs-on: macos-15
    env:
      # Override the .cargo/config.toml default (26.0); non-forced there so this wins.
      MACOSX_DEPLOYMENT_TARGET: "15.0"
    steps:
      - uses: actions/checkout@v5

      - name: Toolchain versions
        run: |
          sw_vers
          xcode-select -p
          xcodebuild -version
          cmake --version

      - name: Ensure Metal compiler
        # mlx-sys builds MLX's Metal kernels from source via cmake, which needs the
        # `metal` compiler. Xcode 16+ ships it as a separately-downloadable component;
        # Xcode 15 has it built in. Download only if missing so this works on either.
        run: |
          if ! xcrun --find metal >/dev/null 2>&1; then
            echo "metal not found — downloading the Metal Toolchain component"
            sudo xcodebuild -downloadComponent MetalToolchain
          fi
          echo "metal: $(xcrun --find metal)"
          xcrun metal --version || true

      - name: Install Rust (pinned by rust-toolchain.toml)
        # No `@stable` — that would install whatever stable is current and ignore the pin. `rustup
        # show` installs the channel named in rust-toolchain.toml (its `components` come with it);
        # the explicit add is idempotent belt-and-suspenders. Bump the toolchain by editing the toml.
        run: |
          rustup show
          rustup component add rustfmt clippy
          rustc --version

      - name: Cache cargo + mlx-sys build
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace
